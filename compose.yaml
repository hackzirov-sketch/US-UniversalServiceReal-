services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: universal_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d universal_service"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    env_file: .env
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.web.asgi:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  worker:
    build: .
    env_file: .env
    command: ["arq", "app.workers.settings.WorkerSettings"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import asyncio,redis.asyncio as r; c=r.from_url('redis://redis:6379/0'); assert asyncio.run(c.exists('arq:queue:health-check'))"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bot:
    build: .
    env_file: .env
    command: ["python", "-m", "app.bot.main"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
