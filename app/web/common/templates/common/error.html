<!doctype html>
<html lang="uz"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{ code }} · UniversalService</title><style>body{margin:0;background:{{ '#bbcbd8' if admin else '#dce9f6' }};font:16px system-ui;color:#17243b;display:grid;place-items:center;min-height:100vh}.dialog{width:min(88vw,480px);background:#fffdf4;border:2px solid #17243b;box-shadow:7px 7px 0 #7795b8}.bar{background:{{ '#6687a7' if admin else '#80b4e8' }};padding:10px 14px;font-weight:800}.body{padding:28px}.code{font:900 54px monospace;margin:0}.btn{display:inline-block;color:inherit;background:#f7d77c;border:2px solid #17243b;padding:10px 16px;text-decoration:none;box-shadow:3px 3px 0 #17243b}</style></head><body><main class="dialog"><div class="bar">UniversalService · {{ 'admin' if admin else 'user' }} dialog</div><div class="body"><p class="code">{{ code }}</p><p>{{ message }}</p><a class="btn" href="{{ '/admin' if admin else '/app' }}">Bosh sahifa</a></div></main></body></html>
